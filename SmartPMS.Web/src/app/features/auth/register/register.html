<div class="register-page">
  <div class="register-card">
    <h2>Create Account</h2>
    <p>Register to Smart PMS</p>

    <div class="alert error" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="alert success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <div class="form-group">
      <label>Employee Code</label>
      <input type="text" [(ngModel)]="model.employeeCode" placeholder="EMP001" />
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="model.fullName" placeholder="Akshay Kumar" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="model.email" placeholder="akshay@test.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="model.password" placeholder="Enter password" />
    </div>

    <div class="form-group">
      <label>Role</label>
      <select [(ngModel)]="model.role">
        <option value="Employee">Employee</option>
        <option value="RPO">RPO</option>
        <option value="RWO">RWO</option>
        <option value="AO">AO</option>
        <option value="HRAdmin">HR Admin</option>
        <option value="SuperAdmin">Super Admin</option>
      </select>
    </div>

    <button (click)="register()" [disabled]="isLoading">
      {{ isLoading ? 'Please wait...' : 'Register' }}
    </button>

    <div class="login-link">
      Already registered?
      <a routerLink="/login">Login</a>
    </div>
  </div>
</div>
