name: Smart PMS CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_FILE: 'SmartPMS.slnx'
  ANGULAR_PROJECT_PATH: 'SmartPMS.Web'
  NODE_VERSION: '20.19.0'

jobs:
  backend-ci:
    name: Backend - Restore, Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend packages
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build backend solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test ${{ env.SOLUTION_FILE }} --configuration Release --no-build --verbosity normal

  angular-ci:
    name: Angular - Install and Build
    runs-on: ubuntu-latest
    needs: backend-ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.ANGULAR_PROJECT_PATH }}/package-lock.json

      - name: Install Angular dependencies
        working-directory: ${{ env.ANGULAR_PROJECT_PATH }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build Angular application
        working-directory: ${{ env.ANGULAR_PROJECT_PATH }}
        run: npm run build -- --configuration production

      - name: Run Angular tests if available
        working-directory: ${{ env.ANGULAR_PROJECT_PATH }}
        run: npm run test --if-present -- --watch=false --browsers=ChromeHeadless
